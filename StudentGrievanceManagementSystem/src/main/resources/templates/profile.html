<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="stylesheet" href="/css/profile.css">
    <title>Edit Profile</title>
</head>
<body>
	<div class="profile-container">

	    <h2>Edit Profile</h2>

	    <form th:action="@{/update-profile}" method="post">

	        <label>Name</label>
	        <input type="text" name="name" th:value="${user.name}" required>

	        <label>Email</label>
	        <input type="email" th:value="${user.email}" disabled>

	        <label>Password</label>
	        <input type="password" name="password" th:value="${user.password}" required>

	        <button type="submit">Update Profile</button>

	    </form>

	    <a href="/student/dashboard" class="back-btn">← Back to Dashboard</a>

	</div>

</body>
</html>
